<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1923" />
  <title>Daftar — AERVINEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/aervinex-ui.css" />
</head>
<body class="theme-dark">

  <button class="btn-icon theme-toggle theme-toggle-fab" aria-label="Ganti tema">
    <svg viewBox="0 0 24 24" class="ico ico-moon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    <svg viewBox="0 0 24 24" class="ico ico-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  </button>

  <main class="auth-shell">
    <div class="auth-brand">
      <span class="brand-dot"></span>
      <h1>AERVINEX</h1>
      <p>From Detection to Action</p>
    </div>

    <section class="card aura-violet" style="padding:28px;display:flex;flex-direction:column;gap:18px">
      <div>
        <h2 class="auth-title">Daftar</h2>
        <p class="auth-sub">Mulai monitoring kesehatan berbasis AI — gratis</p>
      </div>

      <div id="error-box" class="form-error"></div>

      <form id="register-form" style="display:flex;flex-direction:column;gap:14px" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Nama</label>
          <input class="form-input" type="text" id="name" autocomplete="name" placeholder="Nama lengkap" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" autocomplete="email" placeholder="nama@email.com" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" autocomplete="new-password" placeholder="Minimal 8 karakter" required minlength="8" />
          <div id="pwd-meter" aria-live="polite"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Konfirmasi Password</label>
          <input class="form-input" type="password" id="confirm" autocomplete="new-password" placeholder="Ulangi password" required minlength="8" />
        </div>
        <button type="submit" class="btn-block primary" id="btn-register">
          <span>Buat Akun</span>
        </button>
      </form>

      <div class="auth-divider">atau</div>

      <button type="button" class="btn-block google" id="btn-google">
        <svg viewBox="0 0 24 24" width="18" height="18" style="flex-shrink:0">
          <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C18.06 1.19 15.24 0 12 0 7.31 0 3.26 2.69 1.28 6.61l3.99 3.1C6.22 6.86 8.87 4.75 12 4.75z"/>
          <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47c-.28 1.5-1.12 2.77-2.39 3.62l3.86 3c2.26-2.09 3.55-5.17 3.55-8.86z"/>
          <path fill="#FBBC05" d="M5.27 14.29a7.13 7.13 0 010-4.58l-3.99-3.1A12 12 0 000 12c0 1.93.46 3.75 1.28 5.39l3.99-3.1z"/>
          <path fill="#34A853" d="M12 24c3.24 0 5.95-1.07 7.94-2.91l-3.86-3c-1.07.72-2.44 1.16-4.08 1.16-3.13 0-5.78-2.11-6.73-4.96l-3.99 3.1C3.26 21.31 7.31 24 12 24z"/>
        </svg>
        <span>Daftar dengan Google</span>
      </button>

      <button type="button" class="btn-block ghost" id="btn-guest">
        <svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/><path d="M9 11l3 2 3-2" opacity="0.4"/></svg>
        <span>Coba dulu sebagai Guest</span>
      </button>
    </section>

    <p class="auth-foot">
      Sudah punya akun? <a href="/login.html" class="auth-link">Masuk</a>
    </p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app-check.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/password-strength.js"></script>
  <script src="js/aervinex-app.js"></script>
  <script>
    (function () {
      const $ = (s) => document.querySelector(s);
      const errBox = $('#error-box');
      const showError = (msg) => { errBox.textContent = msg; errBox.classList.add('show'); };
      const clearError = () => errBox.classList.remove('show');

      // Detect ?plan=pro / ?plan=family — if pro & no prior trial, mark for trial activation
      const planParam = new URLSearchParams(location.search).get('plan');

      async function maybeMarkTrial(user) {
        if (!user || planParam !== 'pro') return;
        try {
          const subRef = db.collection('subscriptions').doc(user.uid);
          const snap = await subRef.get();
          if (snap.exists && snap.data()?.has_trialed) return; // already used
          const trialUntil = new Date(Date.now() + 7 * 86400000);
          await subRef.set({
            uid: user.uid,
            plan: 'pro',
            status: 'trial',
            trial_until: trialUntil,
            has_trialed: true,
            auto_renew: true,
            payment_provider: 'midtrans',
            started_at: firebase.firestore.FieldValue.serverTimestamp(),
            updated_at: firebase.firestore.FieldValue.serverTimestamp(),
          }, { merge: true });
          try {
            localStorage.setItem('aervinex-trial-activated', '1');
          } catch {}
          if (typeof AervinexToast === 'function') {
            AervinexToast('7-Hari Trial Pro aktif! 🎉', 'success', 3500);
          }
        } catch (e) { console.warn('[register] trial mark failed', e); }
      }

      async function routeAfterAuth(user) {
        if (!user) return;
        await maybeMarkTrial(user);
        let onboarded = localStorage.getItem('aervinex-onboarded') === '1';
        if (!onboarded) {
          try {
            const snap = await db.collection('users').doc(user.uid).get();
            onboarded = snap.exists && snap.data()?.onboarding?.completed === true;
            if (onboarded) localStorage.setItem('aervinex-onboarded', '1');
          } catch {}
        }
        location.replace(onboarded ? '/dashboard.html?trial=' + (planParam === 'pro' ? '1' : '0') : '/onboarding.html');
      }

      auth.onAuthStateChanged(routeAfterAuth);

      // Wire password strength meter
      if (window.AervinexPasswordStrength) {
        AervinexPasswordStrength.attach($('#password'), $('#pwd-meter'));
      }

      $('#register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearError();
        const name = $('#name').value.trim();
        const email = $('#email').value.trim();
        const password = $('#password').value;
        const confirm = $('#confirm').value;
        if (!name || !email || !password) return showError('Semua field wajib diisi.');
        if (password.length < 8) return showError('Password minimal 8 karakter.');
        if (password !== confirm) return showError('Konfirmasi password tidak cocok.');
        // Strength gate
        if (window.AervinexPasswordStrength) {
          const r = AervinexPasswordStrength.score(password);
          if (r.level < AervinexPasswordStrength.MIN_ACCEPTABLE_LEVEL) {
            return showError('Password terlalu lemah. ' + (r.suggestions[0] || 'Coba lebih panjang dan campur huruf/angka/simbol.'));
          }
        }
        const btn = $('#btn-register');
        btn.disabled = true;
        try {
          await AERVINEXAuth.registerEmail(email, password, name);
          if (typeof AervinexToast === 'function') {
            AervinexToast('Akun dibuat. Email verifikasi dikirim ke ' + email, 'success', 4000);
          }
          await routeAfterAuth(auth.currentUser);
        } catch (ex) {
          if (AERVINEXAuth.isRateLimitError(ex.code)) {
            showError('Terlalu banyak percobaan dari IP ini. Tunggu 5 menit lalu coba lagi.');
          } else {
            showError(AERVINEXAuth.friendlyError(ex.code));
          }
        } finally { btn.disabled = false; }
      });

      $('#btn-google').addEventListener('click', async () => {
        clearError();
        try {
          await AERVINEXAuth.signInWithGoogle();
          await routeAfterAuth(auth.currentUser);
        } catch (ex) {
          showError(AERVINEXAuth.friendlyError(ex.code));
        }
      });

      $('#btn-guest').addEventListener('click', async () => {
        clearError();
        try {
          await AERVINEXAuth.signInAsGuest();
          await routeAfterAuth(auth.currentUser);
        } catch (ex) {
          showError(AERVINEXAuth.friendlyError(ex.code));
        }
      });
    })();
  </script>
</body>
</html>
