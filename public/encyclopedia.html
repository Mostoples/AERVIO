<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Encyclopedia — AERVINEX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/aervinex-ui.css" />
</head>
<body class="theme-dark" data-page="encyclopedia">
  <div class="app-shell">
    <header class="top-bar">
      <a href="/profile.html" class="btn-icon"><svg viewBox="0 0 24 24" class="ico"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <div class="page-title-block" style="text-align:center;flex:1"><h2>Encyclopedia</h2><p>Library 35 kondisi · referensi medis</p></div>
      <button class="btn-icon theme-toggle"><svg viewBox="0 0 24 24" class="ico ico-moon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg><svg viewBox="0 0 24 24" class="ico ico-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></button>
    </header>

    <section class="search-wrap">
      <div class="search-input">
        <svg viewBox="0 0 24 24" class="ico"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="enSearch" placeholder="Cari penyakit, gejala, atau topik..." />
      </div>
    </section>

    <section class="card aura-cyan" style="padding:20px">
      <h3 class="section-title">Kategori Pelajari</h3>
      <p style="font-size:12px;color:var(--text-muted);line-height:1.5;margin-bottom:14px">Library berdasarkan SLR 87 paper + clinical guidelines (GINA, WHO, ATS, AHA, ACSM, ESC, NICE).</p>
      <div id="catGrid"></div>
    </section>

    <h3 class="section-title">Semua Artikel</h3>
    <section id="articles" class="list-card card disease-grid"></section>

    <a href="/evidence.html" class="btn-block ghost" style="margin-top:14px">
      <svg viewBox="0 0 24 24" class="ico"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
      <span>Lihat Sumber Riset Lengkap (SLR + Datasets)</span>
    </a>

    <div class="spacer-bottom"></div>
    <nav class="bottom-nav">
      <a href="/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span>Home</span></a>
      <a href="/history.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>Stats</span></a>
      <a href="/running.html" class="nav-item fab"><svg viewBox="0 0 24 24" class="ico ico-fill"><path d="M8 5v14l11-7z"/></svg></a>
      <a href="/recovery.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><path d="M12 21s-7-4.5-7-11a5 5 0 019-3 5 5 0 019 3c0 6.5-7 11-7 11z"/></svg><span>Recovery</span></a>
      <a href="/profile.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg><span>Profile</span></a>
    </nav>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/aervinex-app.js"></script>
  <script src="js/icon-lib.js"></script>
  <script src="js/disease-list.js"></script>
  <script>
    AERVINEXAuth.requireAuth();
    let q = '';
    function render() {
      const cat = document.getElementById('catGrid');
      const cats = [...new Set(DISEASE_LIST.map(d => d.category))];
      cat.innerHTML = cats.map(c => {
        const count = DISEASE_LIST.filter(d => d.category === c).length;
        return `<div style="display:inline-flex;margin:4px 6px 4px 0;padding:6px 12px;border-radius:var(--radius-pill);background:var(--bg-soft);font-size:12px;color:var(--text-muted)">${c} · ${count}</div>`;
      }).join('');

      const filtered = DISEASE_LIST.filter(d => !q || d.name.toLowerCase().includes(q) || d.tagline.toLowerCase().includes(q));
      const art = document.getElementById('articles');
      if (!filtered.length) { art.innerHTML = AervinexEmpty.render({ icon: 'search', title: 'Tidak ada hasil', sub: 'Coba kata kunci lain' }); return; }
      art.innerHTML = filtered.map(d => `
        <a class="list-row" href="/risk-detail.html?id=${d.id}" style="text-decoration:none;color:inherit">
          <div class="list-row-icon">${AervinexIcons.fromEmoji(d.icon)}</div>
          <div class="list-row-body">
            <p class="list-row-title">${d.name}</p>
            <p class="list-row-sub">${d.tagline}</p>
          </div>
          <span class="list-row-meta">${d.category}</span>
        </a>`).join('');
    }
    document.getElementById('enSearch').addEventListener('input', (e) => { q = e.target.value.toLowerCase(); render(); });
    render();
  </script>
</body>
</html>
