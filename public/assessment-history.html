<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Assessment History — AERVINEX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/aervinex-ui.css" />
</head>
<body class="theme-dark" data-page="assessment-history">
  <div class="app-shell">
    <header class="top-bar">
      <a href="/profile.html" class="btn-icon"><svg viewBox="0 0 24 24" class="ico"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <div class="page-title-block" style="text-align:center;flex:1"><h2>Assessment History</h2><p id="countLabel">Loading...</p></div>
      <button class="btn-icon theme-toggle"><svg viewBox="0 0 24 24" class="ico ico-moon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg><svg viewBox="0 0 24 24" class="ico ico-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></button>
    </header>

    <section class="card aura-cyan" style="padding:20px">
      <h3 class="section-title">Trend Visit</h3>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Bandingkan skor lintas waktu untuk kondisi yang sama. Berguna untuk track perubahan setelah modifikasi gaya hidup.</p>
      <div id="trendArea"></div>
    </section>

    <h3 class="section-title">Semua Riwayat</h3>
    <section id="historyList"></section>

    <div class="spacer-bottom"></div>
    <nav class="bottom-nav">
      <a href="/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span>Home</span></a>
      <a href="/history.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>Stats</span></a>
      <a href="/running.html" class="nav-item fab"><svg viewBox="0 0 24 24" class="ico ico-fill"><path d="M8 5v14l11-7z"/></svg></a>
      <a href="/recovery.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><path d="M12 21s-7-4.5-7-11a5 5 0 019-3 5 5 0 019 3c0 6.5-7 11-7 11z"/></svg><span>Recovery</span></a>
      <a href="/profile.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg><span>Profile</span></a>
    </nav>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/aervinex-app.js"></script>
  <script src="js/icon-lib.js"></script>
  <script src="js/disease-list.js"></script>
  <script>
    AERVINEXAuth.requireAuth().then(async (user) => {
      const listEl = document.getElementById('historyList');
      const trendEl = document.getElementById('trendArea');
      // Skeleton state
      listEl.innerHTML = '<section class="card">' + AervinexSkeleton.list(4) + '</section>';
      try {
        const snap = await db.collection('assessments').where('uid', '==', user.uid).orderBy('ts', 'desc').limit(50).get();
        const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        document.getElementById('countLabel').textContent = items.length + ' assessment tersimpan';

        if (!items.length) {
          listEl.innerHTML = AervinexEmpty.render({ icon: 'assessment', title: 'Belum ada assessment', sub: 'Mulai dari Risk List untuk mengisi assessment pertama Anda.', cta: 'Mulai Assessment', ctaHref: '/risk-list.html' });
          trendEl.innerHTML = '<p style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px">Trend akan muncul setelah Anda ada 2+ assessment per kondisi.</p>';
          return;
        }

        // Group by diseaseId, find conditions with 2+ entries
        const byDisease = {};
        items.forEach(it => { byDisease[it.diseaseId] = byDisease[it.diseaseId] || []; byDisease[it.diseaseId].push(it); });
        const trendable = Object.entries(byDisease).filter(([_, arr]) => arr.length >= 2);
        if (trendable.length) {
          trendEl.innerHTML = trendable.map(([id, arr]) => {
            const d = DISEASE_LIST.find(x => x.id === id);
            const dName = d?.name || id;
            const sorted = [...arr].sort((a,b) => (a.ts?.seconds || 0) - (b.ts?.seconds || 0));
            const first = sorted[0].score;
            const last = sorted[sorted.length - 1].score;
            const delta = last - first;
            const arrow = delta > 5 ? 'arrow-up' : delta < -5 ? 'arrow-down' : 'arrow-right';
            const color = delta > 5 ? 'rgb(255,92,124)' : delta < -5 ? 'rgb(74,222,128)' : 'var(--text-muted)';
            return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
              <span style="font-weight:600;flex:1;font-size:13px">${dName}</span>
              <span style="font-size:12px;color:var(--text-muted)">${first}% → ${last}%</span>
              <span style="display:inline-flex;width:18px;height:18px;color:${color}">${AervinexIcons.get(arrow)}</span>
              <span style="font-weight:700;color:${color};min-width:48px;text-align:right;font-size:12px">${delta > 0 ? '+' : ''}${delta}%</span>
            </div>`;
          }).join('');
        } else {
          trendEl.innerHTML = '<p style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px">Lakukan 2+ assessment kondisi yang sama untuk lihat trend.</p>';
        }

        listEl.innerHTML = '<section class="card list-card">' + items.map(it => {
          const d = DISEASE_LIST.find(x => x.id === it.diseaseId);
          const ico = d ? AervinexIcons.fromEmoji(d.icon) : AervinexIcons.get('assessment');
          const date = it.ts ? new Date(it.ts.seconds * 1000) : null;
          const dateStr = date ? date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) + ' · ' + date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '—';
          const levelClass = it.score >= 75 ? 'danger' : it.score >= 50 ? 'warn' : 'ok';
          return `<a class="list-row" href="/risk-detail.html?id=${it.diseaseId}" style="text-decoration:none;color:inherit">
            <div class="list-row-icon">${ico}</div>
            <div class="list-row-body">
              <p class="list-row-title">${d?.name || it.diseaseId}</p>
              <p class="list-row-sub">${dateStr} · skor user: ${it.score}% · ML: ${it.mlBaseline ?? '—'}%</p>
            </div>
            <span class="tbl-status ${levelClass}">${it.score}%</span>
          </a>`;
        }).join('') + '</section>';
      } catch (err) {
        listEl.innerHTML = AervinexEmpty.render({ icon: 'warn-c', title: 'Gagal load history', sub: err.message });
      }
    });
  </script>
</body>
</html>
