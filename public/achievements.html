<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Achievements — AERVINEX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/aervinex-ui.css" />
  <style>
    .badge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; }
    .badge-card {
      padding: 18px 14px;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      transition: transform 0.2s;
      cursor: pointer;
    }
    .badge-card:hover { transform: translateY(-3px); }
    .badge-card.locked { opacity: 0.4; filter: grayscale(0.7); }
    .badge-icon-wrap {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--bg-soft);
      box-shadow: var(--shadow-raised-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .badge-icon-wrap svg { width: 36px; height: 36px; }
    .badge-card.earned .badge-icon-wrap {
      background: linear-gradient(135deg, var(--accent), rgb(167,139,250));
      color: #06222a;
      box-shadow: 0 0 24px rgba(0,229,212,0.5);
    }
    .badge-title { font-size: 13px; font-weight: 700; color: var(--text); }
    .badge-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  </style>
</head>
<body class="theme-dark" data-page="achievements">
  <div class="app-shell">
    <header class="top-bar">
      <a href="/profile.html" class="btn-icon"><svg viewBox="0 0 24 24" class="ico"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a>
      <div class="page-title-block" style="text-align:center;flex:1"><h2>Achievements</h2><p id="progressLabel">—</p></div>
      <button class="btn-icon theme-toggle"><svg viewBox="0 0 24 24" class="ico ico-moon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg><svg viewBox="0 0 24 24" class="ico ico-sun"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></button>
    </header>
    <section class="card aura-cyan" id="progressCard" style="padding:20px"></section>
    <!-- Streak card -->
    <section id="streakCard" style="margin:14px 0"></section>
    <section id="grid" class="badge-grid"></section>

    <button class="btn-pill" id="btnTest" style="margin:14px auto;display:inline-flex">
      <svg viewBox="0 0 24 24" class="ico"><path d="M12 5v14M5 12h14"/></svg>
      <span>Test award badge (demo)</span>
    </button>

    <div class="spacer-bottom"></div>
    <nav class="bottom-nav">
      <a href="/dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span>Home</span></a>
      <a href="/history.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>Stats</span></a>
      <a href="/running.html" class="nav-item fab"><svg viewBox="0 0 24 24" class="ico ico-fill"><path d="M8 5v14l11-7z"/></svg></a>
      <a href="/recovery.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><path d="M12 21s-7-4.5-7-11a5 5 0 019-3 5 5 0 019 3c0 6.5-7 11-7 11z"/></svg><span>Recovery</span></a>
      <a href="/profile.html" class="nav-item"><svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg><span>Profile</span></a>
    </nav>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/aervinex-app.js"></script>
  <script src="js/icon-lib.js"></script>
  <script src="js/streak-tracker.js" defer></script>
  <script>
    AERVINEXAuth.requireAuth();
    // Streak card render once ready
    setTimeout(() => window.AervinexStreak?.renderCard(document.getElementById('streakCard')), 400);
    function render() {
      const all = AervinexBadges.all();
      const earned = AervinexBadges.earned();
      const grid = document.getElementById('grid');
      grid.innerHTML = all.map(b => `
        <div class="card aura-amber badge-card ${earned.includes(b.id) ? 'earned' : 'locked'}" title="${b.title}">
          <div class="badge-icon-wrap">${AervinexIcons.get(b.icon)}</div>
          <div class="badge-title">${b.title}</div>
          <div class="badge-desc">${b.desc}</div>
        </div>`).join('');
      const pct = Math.round(earned.length / all.length * 100);
      document.getElementById('progressLabel').textContent = `${earned.length}/${all.length} unlocked · ${pct}%`;
      document.getElementById('progressCard').innerHTML = `
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
          <span style="color:var(--text-muted)">Progress</span>
          <span style="font-weight:800;color:var(--accent)">${earned.length}/${all.length}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <p style="font-size:11px;color:var(--text-dim);margin-top:8px">Selesaikan aktivitas untuk unlock badge baru. Badge tersimpan di device + cloud.</p>`;
    }
    render();
    document.getElementById('btnTest').addEventListener('click', () => {
      const all = AervinexBadges.all();
      const earned = AervinexBadges.earned();
      const next = all.find(b => !earned.includes(b.id));
      if (next) { AervinexBadges.award(next.id); render(); }
      else AervinexToast('Semua badge sudah unlocked!', 'info');
    });
  </script>
</body>
</html>
