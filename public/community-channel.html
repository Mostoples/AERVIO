<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1923" />
  <title>Channel — AERVINEX Komunitas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/aervinex-ui.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .ch-topbar {
      flex-shrink: 0;
      padding: 12px 14px;
      background: rgba(15,25,35,0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 50;
    }
    .ch-back {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.06);
      border: none; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text);
    }
    .ch-back svg { width: 18px; height: 18px; }
    .ch-meta { flex: 1; min-width: 0; }
    .ch-meta h1 {
      font-size: 14.5px; font-weight: 700;
      margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .ch-meta h1 .icon { font-size: 16px; }
    .ch-meta .sub { font-size: 11px; opacity: 0.7; display: flex; gap: 8px; align-items: center; }
    .ch-meta .sub .dot { width: 6px; height: 6px; border-radius: 50%; background: #00e5d4; box-shadow: 0 0 6px #00e5d4; animation: chPulse 1.4s infinite; }
    @keyframes chPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.3 } }
    .ch-actions { display: flex; gap: 6px; }
    .ch-action-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.05);
      border: none; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
    }

    .ch-messages {
      flex: 1; overflow-y: auto;
      padding: 14px 14px 90px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    .ch-msg {
      display: flex; gap: 10px;
      max-width: 85%;
      animation: chFadeIn 0.25s ease-out;
    }
    @keyframes chFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .ch-msg.self { align-self: flex-end; flex-direction: row-reverse; }
    .ch-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #00e5d4, #a78bfa);
      color: #0f1923;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
      flex-shrink: 0;
    }
    .ch-msg.self .ch-avatar { background: linear-gradient(135deg, #ff5470, #a78bfa); }
    .ch-bubble {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 8px 12px 10px;
      min-width: 0;
    }
    .ch-msg.self .ch-bubble {
      background: rgba(0,229,212,0.12);
      border-color: rgba(0,229,212,0.25);
    }
    .ch-bubble .name { font-size: 11px; font-weight: 700; color: #00e5d4; margin-bottom: 2px; }
    .ch-msg.self .ch-bubble .name { display: none; }
    .ch-bubble .text { font-size: 13.5px; line-height: 1.5; word-wrap: break-word; }
    .ch-bubble .time { font-size: 10px; opacity: 0.5; margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
    .ch-bubble .actions {
      display: flex; gap: 4px; margin-top: 6px;
      opacity: 0; transition: opacity 0.15s;
    }
    .ch-msg:hover .ch-bubble .actions { opacity: 0.85; }
    .ch-bubble .actions button {
      background: transparent; border: none;
      font-size: 11px; color: var(--text-muted);
      cursor: pointer; padding: 2px 4px;
    }
    .ch-bubble .actions button:hover { color: #ff5470; }

    .ch-day-divider {
      text-align: center;
      font-size: 11px; opacity: 0.5;
      font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      margin: 16px 0 6px;
    }

    .ch-input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent, rgba(15,25,35,0.95) 30%);
      display: flex; gap: 8px; align-items: flex-end;
      z-index: 40;
    }
    .ch-input {
      flex: 1;
      padding: 12px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      color: var(--text); font-size: 14px;
      resize: none; min-height: 44px; max-height: 120px;
      font-family: inherit;
    }
    .ch-input:focus {
      outline: none;
      border-color: #00e5d4;
      box-shadow: 0 0 0 3px rgba(0,229,212,0.15);
    }
    .ch-send {
      width: 44px; height: 44px; flex-shrink: 0;
      background: linear-gradient(135deg, #00e5d4, #a78bfa);
      color: #0f1923; border: none; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .ch-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .ch-send:not(:disabled):hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,229,212,0.3); }
    .ch-send svg { width: 18px; height: 18px; }

    .ch-empty {
      text-align: center; padding: 60px 20px;
      opacity: 0.6;
    }
    .ch-empty .ico { font-size: 48px; margin-bottom: 12px; }
    .ch-empty p { font-size: 13px; line-height: 1.55; max-width: 280px; margin: 0 auto; }

    .ch-disclaimer {
      margin: 0 14px 4px;
      padding: 8px 12px;
      background: rgba(252,211,77,0.08);
      border-left: 2px solid #fcd34d;
      border-radius: 6px;
      font-size: 10.5px; line-height: 1.45;
      opacity: 0.85;
    }
  </style>
</head>
<body class="theme-dark" data-page="community-channel">

  <header class="ch-topbar">
    <button class="ch-back" onclick="location.href='/community.html'" aria-label="Kembali">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="ch-meta">
      <h1><span class="icon" id="chIcon">💬</span><span id="chName">Loading…</span></h1>
      <div class="sub"><span class="dot"></span><span id="chOnline">— online</span> · <span id="chMembers">— anggota</span></div>
    </div>
    <div class="ch-actions">
      <button class="ch-action-btn" id="btnInfo" aria-label="Info channel" title="Info channel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      </button>
    </div>
  </header>

  <div class="ch-disclaimer">
    🚨 Bukan saran medis. Untuk masalah kesehatan serius, konsultasi dokter atau hubungi 119 (PSC Kemenkes).
  </div>

  <main id="main" class="ch-messages" id="messages">
    <div class="ch-empty">
      <div class="ico">💬</div>
      <p>Belum ada pesan di channel ini. Jadilah yang pertama!</p>
    </div>
  </main>

  <div class="ch-input-bar">
    <textarea class="ch-input" id="msgInput" placeholder="Tulis pesan… (Enter kirim, Shift+Enter baris baru)" rows="1"></textarea>
    <button class="ch-send" id="btnSend" disabled aria-label="Kirim pesan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="/js/firebase-config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/aervinex-app.js"></script>
  <script>
    const CHANNEL_META = {
      'pelari-jakarta':  { icon: '🏃', name: 'Pelari Jakarta' },
      'pelari-bandung':  { icon: '🏔️', name: 'Pelari Bandung' },
      'pelari-surabaya': { icon: '🌊', name: 'Pelari Surabaya' },
      'komuter-motor':   { icon: '🛵', name: 'Komuter Motor' },
      'urban-jakarta':   { icon: '🏙️', name: 'Warga Urban Jakarta' },
      'asma-support':    { icon: '🌬️', name: 'Asma Support Group' },
      'cardiac-support': { icon: '❤️', name: 'Cardiac Support' },
      'stress-mgmt':     { icon: '🧘', name: 'Stress & Sleep' },
    };

    const params = new URLSearchParams(location.search);
    const channelId = params.get('ch') || 'pelari-jakarta';
    const meta = CHANNEL_META[channelId] || { icon: '💬', name: 'Channel' };
    document.getElementById('chIcon').textContent = meta.icon;
    document.getElementById('chName').textContent = meta.name;
    document.title = meta.name + ' — Komunitas AERVINEX';

    const msgsEl = document.getElementById('messages');
    const inputEl = document.getElementById('msgInput');
    const sendBtn = document.getElementById('btnSend');
    let currentUser = null;
    let unsubscribe = null;
    const RATE_LIMIT_MS = 1500; // 1 msg per 1.5s
    let lastSent = 0;

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function initials(name) {
      return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    }

    function renderMessages(msgs) {
      if (!msgs.length) {
        msgsEl.innerHTML = '<div class="ch-empty"><div class="ico">💬</div><p>Belum ada pesan di channel ini. Jadilah yang pertama!</p></div>';
        return;
      }
      let html = '';
      let lastDay = '';
      msgs.forEach(m => {
        const d = m.createdAt?.toDate ? m.createdAt.toDate() : new Date();
        const dayKey = d.toLocaleDateString('id-ID');
        if (dayKey !== lastDay) {
          html += `<div class="ch-day-divider">${dayKey}</div>`;
          lastDay = dayKey;
        }
        const isSelf = currentUser && m.uid === currentUser.uid;
        const timeStr = d.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
        html += `
          <div class="ch-msg ${isSelf ? 'self' : ''}">
            <div class="ch-avatar">${escapeHTML(initials(m.name))}</div>
            <div class="ch-bubble">
              <div class="name">${escapeHTML(m.name || 'Anonim')}</div>
              <div class="text">${escapeHTML(m.text || '')}</div>
              <div class="time">${timeStr}</div>
              <div class="actions">
                ${!isSelf ? `<button onclick="reportMsg('${m.id}')" title="Laporkan">🚩 Lapor</button>` : `<button onclick="deleteMsg('${m.id}')" title="Hapus">🗑️ Hapus</button>`}
              </div>
            </div>
          </div>`;
      });
      msgsEl.innerHTML = html;
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function subscribeMessages() {
      if (!window.db) return;
      if (unsubscribe) unsubscribe();
      unsubscribe = db.collection('community_channels').doc(channelId).collection('messages')
        .orderBy('createdAt', 'asc')
        .limitToLast(100)
        .onSnapshot(snap => {
          const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderMessages(msgs);
        }, err => {
          console.warn('[chat] subscribe error:', err.code, err.message);
        });
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !currentUser) return;
      const now = Date.now();
      if (now - lastSent < RATE_LIMIT_MS) {
        AervinexToast && AervinexToast('Tunggu 1.5 detik sebelum kirim lagi', 'warn');
        return;
      }
      if (text.length > 500) {
        AervinexToast && AervinexToast('Pesan maksimal 500 karakter', 'warn');
        return;
      }
      lastSent = now;
      sendBtn.disabled = true;
      const name = window.AERVINEXAuth?.userProfile?.name || currentUser.displayName || 'Anonim';
      try {
        await db.collection('community_channels').doc(channelId).collection('messages').add({
          uid: currentUser.uid,
          name,
          text,
          channel: channelId,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          flagged: false,
        });
        inputEl.value = '';
        inputEl.style.height = 'auto';
      } catch (e) {
        console.error('[chat] send failed:', e);
        AervinexToast && AervinexToast('Gagal kirim. Coba lagi.', 'error');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    async function reportMsg(msgId) {
      if (!confirm('Laporkan pesan ini sebagai spam/abuse?')) return;
      try {
        await db.collection('community_reports').add({
          channel: channelId,
          msgId,
          reportedBy: currentUser.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          status: 'pending',
        });
        AervinexToast && AervinexToast('Laporan dikirim. Tim moderator akan review.', 'success');
      } catch (e) {
        console.error('[chat] report failed:', e);
      }
    }

    async function deleteMsg(msgId) {
      if (!confirm('Hapus pesan ini? Tidak bisa dibatalkan.')) return;
      try {
        await db.collection('community_channels').doc(channelId).collection('messages').doc(msgId).delete();
      } catch (e) {
        console.error('[chat] delete failed:', e);
        AervinexToast && AervinexToast('Gagal hapus. Hanya pemilik pesan yang bisa hapus.', 'error');
      }
    }
    window.reportMsg = reportMsg;
    window.deleteMsg = deleteMsg;

    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim() || !currentUser;
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);

    AERVINEXAuth.init(
      (user) => {
        currentUser = user;
        sendBtn.disabled = !inputEl.value.trim();
        subscribeMessages();
      },
      () => location.replace('/login.html?next=/community-channel.html?ch=' + channelId)
    );
  </script>
</body>
</html>
