name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-hosting:
    name: Deploy Hosting + Functions
    runs-on: ubuntu-latest
    if: github.repository_owner == 'aervinex'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cloud Functions deps
        working-directory: ./functions
        run: npm ci || npm install

      - name: Run ML test before deploy (gate)
        run: |
          cd ml/local-test
          node run-tests.js | tee /tmp/test.txt
          AVG=$(grep "Avg Accuracy" /tmp/test.txt | grep -oE "[0-9]+\.[0-9]+" | head -1)
          # Hard gate: don't deploy if accuracy drops below 80%
          python3 -c "import sys; sys.exit(0 if float('$AVG') >= 80 else 1)"

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AERVINEX }}'
          channelId: live
          projectId: aervinex
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

  preview-channel:
    name: PR Preview Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_AERVINEX }}'
          projectId: aervinex
          expires: 7d
